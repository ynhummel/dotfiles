unbind C-b
set -g prefix C-a

set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB,xterm-256color:RGB"
# set -ga terminal-overrides ",alacritty:Tc,xterm-256color:Tc"

# remove escape time
set -s escape-time 0

unbind r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reloaded tmux conf"

# ======== Panes ========
 
# v and h are not binded by default
unbind v
unbind h

unbind % # Split vertically
unbind '"' # Split horizontally

bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

set -g history-limit 10000

set -g mouse on

set -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi

bind-key -r n next-window
bind-key -r p previous-window

# Copy paste
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection

bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard" #x11
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy" #wayland

